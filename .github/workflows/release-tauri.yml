name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
    - "v*"

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: macos-latest
          container: ""
          args: --target aarch64-apple-darwin --bundles app
        - platform: macos-latest
          container: ""
          args: --target x86_64-apple-darwin --bundles app
        - platform: ubuntu-22.04
          container: ""
          args: --bundles deb
        - platform: windows-latest
          container: ""
          args: ""

    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Linux base tools
      if: matrix.platform == 'ubuntu-22.04'
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: UTC
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ca-certificates \
          curl \
          file \
          git \
          build-essential \
          pkg-config \
          python3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Cache Rust
      uses: swatinem/rust-cache@v2
      if: matrix.platform != 'windows-latest'
      with:
        workspaces: src-tauri

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

    - name: Install Linux system packages
      if: matrix.platform == 'ubuntu-22.04'
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: UTC
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.0-dev \
          libjavascriptcoregtk-4.0-dev \
          libsoup2.4-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          libfuse2 \
          libharfbuzz0b \
          libxcb-icccm4

    - name: Install frontend dependencies
      run: npm ci

    - name: Build Tauri bundles
      uses: tauri-apps/tauri-action@v0.6.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: app-v__VERSION__
        releaseName: CNS Desktop v__VERSION__
        releaseBody: |
          Desktop bundles for Windows, macOS, and Linux.
          Download asset that matches your operating system.
        releaseDraft: true
        prerelease: false
        args: ${{ matrix.args }}
